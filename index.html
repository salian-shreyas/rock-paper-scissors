<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width">
        <title>Rock Paper Scissors</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Tourney:wght@200&display=swap&family=EB+Garamond:ital,wght@1,600&family=Qahiri&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="styles/style.css" type="text/css" media="screen" title="no title" charset="utf-8">
        
        <script src="scripts/script.js" defer></script>

    </head>

    <body>

        <section id="heading">
            <h1>Choose Your Weapon</h1>
        </section>

        <section id="buttons">

            <div class="button">
                <button id="rock" data-key="82">Rock</button>
                <div class="control"><em>PRESS</em> R</div>
            </div>
            <div class="button">
                <button id="paper" data-key="80">Paper</button>
                <div class="control"><em>PRESS</em> P</div>
            </div>
            <div class="button">
                <button id="scissors" data-key="83">Scissors</button>
                <div class="control"><em>PRESS</em> S</div>
            </div>

        </section>

        <section id="scores">

            <div>
                <h2 class="score-title">You</h2>
                <div id="player" class="score-div">
                    <h3 id="you-played">Your Choice</h3>
                    <div id="your-score">Score: 0</div>
                </div>
            </div>
            <div>
                <h2 class="score-title">Computer</h2>
                <div id="computer" class="score-div">
                    <h3 id="comp-played">Computer Choice</h3>
                    <div id="comp-score">Score: 0</div>
                </div>
            </div>
        </section>

    </body>

</html>
